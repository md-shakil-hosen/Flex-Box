<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox</title>

    <style>
        .container {
            display: flex;
            height: 400px;
            justify-content: flex-start;
            align-items: stretch;

        }

        .box {
            font-size: 1em;
            width: 200px;
            /* height: 200px; */
            border: 1px solid rgb(230, 227, 227);
            box-shadow: rgba(149, 157, 165, 0.2) 0px 8px 24px;
        }

        .box a {
            display: flex;
            justify-content: center;
            padding: 5px 10px;
            text-decoration: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 700;
            color: white;
            margin-bottom: 10px;
            margin-left: 50px;
            width: 70px;
            background-color: seagreen;
            border-radius: 7px;
        }

        .box a:hover {
            background-color: white;
            border-bottom: 5px solid seagreen;
            color: black;
            transition: 1s ease;
            box-shadow: rgba(149, 157, 165, 0.2) 0px 8px 24px;
        }

        .top-link {
            margin-top: 80px;
        }

        #order {
            flex-grow: 1;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 20px;
            font-weight: 700px;
            padding: 5px;

        }

        .allbum-container {
            display: flex;
            font-size: 2vw;
        }

        .allbum {
            margin: 10px;
            width: 50%;
            height: 300px;
            border-radius: 5px;
            box-shadow: rgba(149, 157, 165, 0.2) 0px 8px 24px;
        }

        .cercle {
            width: 50px;
            height: 50px;
            background-color: silver;
            transition-property: width;
            transition-duration: 2s;
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: bolder;
            color: silver;
            position: fixed;
        }

        .cercle:hover {
            background-color: tomato;
            width: 260px;
            color: white;
        }

        .cercle-img {
            width: 50px;
            background-image: url(viktor-forgacs-FcDqdJUM6B4-unsplash.jpg);
            background-size: cover;
            transition-property: width;
            transition-duration: 2s;
            margin-bottom: 100px;
            height: 150px;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: rgba(149, 157, 165, 0.2) 0px 8px 24px;
        }

        img {
            width: 270px;
        }

        .cercle-img:hover {
            height: 150px;
            width: 263px;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            text-transform: uppercase;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        h4 {
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .ani {
            animation: mymove 5s infinite;
        }
    </style>
</head>
<h1>I am Flexbox <span style="color: seagreen;">animation </span>right now</h1>
<div class="container">
    <div class="box">
        <a class="top-link" href="#">Home</a>
        <a href="#">Servise</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </div>
    <div id="order" class="box">Photo Allbum
        <div class="allbum-container">
            <div class="allbum img">
                <div class="cercle-img">
                    <img src="lady-doctor.png" alt="" width="180px">
                </div>
                <div class="cercle">LOVE ME
                </div>
            </div>
            <div class="allbum">
                <div class="cercle-img">
                    <img src="Saly-11.png" alt="" width="180px" style="background-color: slateblue;">
                    <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Nesciunt, debitis.</p>
                </div>
                <div class="cercle"></div>
            </div>
            <div class="allbum">
                <div class="cercle-img img-3">
                    <img src="lady-doctor.png" alt="" width="100%" style="background-color: blanchedalmond;">
                </div>
                <div class="cercle"></div>
            </div>
            <div class="allbum">
                <div class="cercle-img">
                    <img src="Saly-1.png" alt="" width="100%" style="background-color: thistle;">
                </div>
                <div class="cercle ani"></div>
            </div>
        </div>
    </div>
</div>

</html>
